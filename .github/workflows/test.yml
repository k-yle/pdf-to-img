name: Build and Test

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version:
          - { v: 20.19.0 }
          - { v: 20.x }
          - { v: 22.13.0 }
          - { v: 22.x }
          - { v: 23.x }
          - { v: 24.x }
          - { v: 25.x, isLatest: yes }
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: ⏬ switch off autocrlf
        # see https://github.com/actions/checkout/issues/135
        run: git config --global core.autocrlf false

      - name: ⏬ Checkout code
        uses: actions/checkout@v6

      - name: 🔢 Use Node.js ${{ matrix.node-version.v }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version.v }}
          registry-url: "https://registry.npmjs.org"

      - name: ⏬ Install
        run: |
          npm install

      - name: ✨ Lint
        run: |
          npm run lint

      - name: 🔨 Build
        run: |
          npm run build

      - name: 🧪 Test
        run: |
          npm test -- --coverage
        env:
          FORCE_COLOR: 1
          JEST_IMAGE_SNAPSHOT_TRACK_OBSOLETE: 1

      - name: 📸 Upload failed screenshot tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: tests/__image_snapshots__/__diff_output__/*

      - name: 📈 Coveralls
        continue-on-error: true # this integration is quite buggy
        uses: coverallsapp/github-action@3dfc5567390f6fa9267c0ee9c251e4c8c3f18949 # v2.2.3
        with:
          github-token: ${{ secrets.github_token }}

      - name: 📦 Publish
        uses: k-yle/npm-publish@v1
        if: ${{ matrix.node-version.isLatest }}
